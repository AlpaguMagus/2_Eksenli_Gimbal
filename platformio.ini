[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
; SWD clock'u düşür: 2 MHz default, 2-motor rewire sonrası uzun/gürültülü
; jumper'larda "unable to connect" verdi (2026-06-09). 480 kHz başta çalıştı ama
; 2026-06-12'de erase/write aşamasında kararsızlaştı ("failed erasing sectors") →
; 200 kHz güvenilir flash (jumper güç-bütünlüğü; openocd ile doğrulandı).
upload_flags =
    -c
    adapter speed 200
monitor_speed = 115200
extra_scripts = pre:add_usb_middleware.py
build_flags =
    -Wl,-u,_printf_float
    -lm
