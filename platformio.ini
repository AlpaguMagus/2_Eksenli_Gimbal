[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
; SWD clock'u düşür: 2 MHz default, 2-motor rewire sonrası uzun/gürültülü
; jumper'larda "unable to connect to the target" verdi (2026-06-09). 480 kHz
; güvenilir bağlanır (openocd ile doğrulandı).
upload_flags =
    -c
    adapter speed 480
monitor_speed = 115200
extra_scripts = pre:add_usb_middleware.py
build_flags =
    -Wl,-u,_printf_float
    -lm
